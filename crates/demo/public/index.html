<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smallstack Demo</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 680px; margin: 2rem auto; padding: 0 1rem; }
  h1 { margin-bottom: .25rem; }
  .sub { color: #666; margin-top: 0; }
  hr { margin: 1.5rem 0; }
  .row { display: flex; gap: .5rem; margin-bottom: .75rem; align-items: center; }
  input, select { flex: 1; padding: .4rem .5rem; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: .4rem .9rem; border: 1px solid #888; border-radius: 4px; background: #f5f5f5; cursor: pointer; }
  button:hover { background: #e5e5e5; }
  button.primary { background: #0066cc; color: #fff; border-color: #0066cc; }
  button.primary:hover { background: #0055aa; }
  pre { background: #f5f5f5; padding: .75rem; border-radius: 4px; overflow-x: auto; font-size: .85rem; min-height: 2rem; }
  .status { font-size: .8rem; color: #666; margin-left: .5rem; }
  .ok { color: #0a0; }
  .err { color: #c00; }
</style>
</head>
<body>

<h1>Smallstack Demo</h1>
<p class="sub">API server powered by <code>mini-serve</code> + <code>mini-unified</code></p>

<hr>

<div class="row">
  <input id="nameInput" type="text" placeholder="Item name" autofocus>
  <button class="primary" id="addBtn">Add Item</button>
  <span class="status" id="addStatus"></span>
</div>

<hr>

<div class="row">
  <select id="itemSelect"><option value="">— no items loaded —</option></select>
  <button id="getBtn">Get Item</button>
  <button id="refreshBtn">Refresh</button>
  <span class="status" id="listStatus"></span>
</div>

<hr>

<pre id="output">// response will appear here</pre>

<script>
const $ = id => document.getElementById(id);
const nameInput = $('nameInput');
const addBtn = $('addBtn');
const addStatus = $('addStatus');
const itemSelect = $('itemSelect');
const getBtn = $('getBtn');
const refreshBtn = $('refreshBtn');
const listStatus = $('listStatus');
const output = $('output');

function show(resp, data) {
  output.textContent = `${resp.status} ${resp.statusText}\n${JSON.stringify(data, null, 2)}`;
}

function status(el, text, ok) {
  el.textContent = text;
  el.className = 'status' + (ok !== undefined ? (ok ? ' ok' : ' err') : '');
}

async function loadItems() {
  status(listStatus, 'loading…');
  try {
    const resp = await fetch('/api/items');
    const data = await resp.json();
    show(resp, data);
    if (!resp.ok) { status(listStatus, 'failed', false); return; }
    const items = data.items || [];
    itemSelect.innerHTML = '<option value="">— select an item —</option>'
      + items.map(i => `<option value="${i.id}">#${i.id} – ${i.name}</option>`).join('');
    status(listStatus, `${items.length} item${items.length !== 1 ? 's' : ''}`, true);
  } catch (e) {
    status(listStatus, 'error: ' + e.message, false);
  }
}

async function getItem() {
  const id = itemSelect.value;
  if (!id) { status(listStatus, 'no item selected', false); return; }
  try {
    const resp = await fetch(`/api/items/${id}`);
    const data = await resp.json();
    show(resp, data);
    status(listStatus, resp.ok ? 'ok' : 'not found', resp.ok);
  } catch (e) {
    status(listStatus, 'error: ' + e.message, false);
  }
}

addBtn.addEventListener('click', async () => {
  const name = nameInput.value.trim();
  if (!name) { status(addStatus, 'enter a name', false); return; }
  status(addStatus, 'creating…');
  try {
    const resp = await fetch('/api/items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const data = await resp.json();
    show(resp, data);
    status(addStatus, resp.ok ? 'created' : 'failed', resp.ok);
    if (resp.ok) { nameInput.value = ''; await loadItems(); }
  } catch (e) {
    status(addStatus, 'error: ' + e.message, false);
  }
});

nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
getBtn.addEventListener('click', getItem);
refreshBtn.addEventListener('click', loadItems);

loadItems();
</script>
</body>
</html>
